# Mise à jour automatique des tirages (Keno, EuroMillions, Loto).
#
# Tourne après chaque tirage, télécharge les archives FDJ, régénère
# site/data/*.json et committe. Si le site est branché sur ce dépôt
# (Netlify / Vercel / GitHub Pages), le commit redéploie automatiquement.
#
# Les URLs d'archives FDJ sont déjà renseignées dans tools/update_data.py.
#
# Note : les horaires GitHub Actions peuvent dériver de 15-30 min aux heures
# de pointe — acceptable ici, les marges sont prévues.

name: Mise à jour des tirages

on:
  schedule:
    # Heures en UTC (France = UTC+1 hiver / UTC+2 été).
    - cron: "35 12 * * *"    # ~14h35 FR été — après le Keno midi
    - cron: "35 20 * * *"    # ~22h35 FR été — après le Keno soir
    - cron: "50 21 * * 2,5"  # mar/ven ~23h50 FR été — après l'EuroMillions
    - cron: "50 20 * * 1,3,6" # lun/mer/sam — après le Loto
    - cron: "55 20 * * 1,4"   # lun/jeu — après l'EuroDreams (tirage 21h, publication ~22h : voir note)
  workflow_dispatch: {}      # bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Régénérer les JSON de tirages
        run: python tools/update_data.py

      - name: Committer si les données ont changé
        run: |
          git config user.name "tirages-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/*.json data-private/*.json
          if git diff --cached --quiet; then
            echo "Aucun nouveau tirage."
          else
            git commit -m "data: tirages du $(date -u +%Y-%m-%d)"
            git push
          fi

