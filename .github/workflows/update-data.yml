# Mise à jour automatique des tirages (Keno, EuroMillions, Loto, EuroDreams).
#
# Télécharge les archives FDJ, régénère site/data/*.json et committe.
# Si le site est branché sur ce dépôt (Netlify), le commit redéploie tout seul.

name: Mise à jour des tirages

on:
  schedule:
    # Heures en UTC (France = UTC+1 hiver / UTC+2 été). Espacées pour éviter
    # que deux exécutions se chevauchent.
    - cron: "40 12 * * *"     # ~14h40 FR été — après le Keno midi
    - cron: "40 21 * * *"     # ~23h40 FR été — après les tirages du soir
  workflow_dispatch: {}       # bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Régénérer les JSON de tirages
        run: python tools/update_data.py

      - name: Committer si les données ont changé
        run: |
          git config user.name "tirages-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/*.json data-private/*.json
          if git diff --cached --quiet; then
            echo "Aucun nouveau tirage."
          else
            git commit -m "data: tirages du $(date -u +%Y-%m-%d)"
            # Récupère les changements distants avant de pousser, pour éviter
            # le rejet "fetch first" quand plusieurs exécutions se suivent.
            git pull --rebase --autostash origin main
            git push
          fi
